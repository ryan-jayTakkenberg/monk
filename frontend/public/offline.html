<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1A6FD4" />
    <title>Monk — Offline</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500&display=swap');

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        background-color: #0a0a0a;
        color: #ffffff;
        font-family: 'Barlow', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 32px 24px;
        text-align: center;
        gap: 16px;
      }

      .wordmark {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 64px;
        letter-spacing: 0.08em;
        color: #1A6FD4;
        line-height: 1;
      }

      .divider {
        width: 40px;
        height: 2px;
        background-color: #1A6FD4;
      }

      .message {
        font-size: 16px;
        font-weight: 400;
        color: #999999;
        line-height: 1.5;
        max-width: 280px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="wordmark">MONK</p>
      <div class="divider"></div>
      <p class="message">No connection. Open the app when you're back online.</p>
    </div>
  </body>
</html>
