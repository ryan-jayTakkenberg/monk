name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-test-key
      DEBUG: "False"
      DATABASE_URL: sqlite:///ci-test.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Python / Django ---

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Django tests
        working-directory: backend
        run: python manage.py test

      # --- Node / TypeScript ---

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript build check
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # Deploy — only on push to main, only after all tests pass
  # ---------------------------------------------------------------------------
  # To wire this up to Railway:
  #   1. Generate a token at railway.app → Account Settings → Tokens
  #   2. Add it as a repository secret: Settings → Secrets → RAILWAY_TOKEN
  #   3. Replace the echo below with:
  #        run: |
  #          npm install -g @railway/cli
  #          railway up --service <your-service-name>
  #      and set:
  #        env:
  #          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway (placeholder)
        run: echo "Deploy to Railway — set up Railway CLI here"
        # To activate: see comment block above the deploy job
